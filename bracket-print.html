<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NCAA March Madness 2026 — Official Bracket</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;color:#e8eef8;font-family:'Arial Narrow',Arial,sans-serif}

.screen-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:#0f1a2e;border-bottom:1px solid rgba(255,255,255,.1);
}
.screen-btn h2{font-family:'Arial Black',sans-serif;font-size:18px;letter-spacing:2px;color:#ff5c00}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.5px}
.btn-print{background:#ff5c00;color:#fff}
.btn-print:hover{background:#ff7a30}
.btn-back{background:rgba(255,255,255,.08);color:#8fa3be;border:1px solid rgba(255,255,255,.15)}
.btn-back:hover{color:#e8eef8}

/* ═══════════════════════════════
   BRACKET SHEET
═══════════════════════════════ */
.bracket-sheet{
  width:1400px;margin:0 auto;padding:16px;
  overflow-x:auto;
}

/* Header */
.bk-header{
  text-align:center;padding:10px 0 14px;
  border-bottom:3px solid #ff5c00;margin-bottom:14px;
}
.bk-title{font-family:'Arial Black',sans-serif;font-size:32px;letter-spacing:4px;color:#ff5c00;text-transform:uppercase}
.bk-year{font-size:14px;letter-spacing:3px;color:#f5b700;margin-top:2px}
.bk-name-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:8px;font-size:12px;color:#8fa3be}
.bk-name-blank{width:180px;border-bottom:1px solid rgba(255,255,255,.3);height:14px}

/* Main layout */
.bk-body{
  display:grid;
  grid-template-columns: 148px 120px 92px 68px  60px  68px 92px 120px 148px;
  grid-template-rows: auto auto;
  gap:0;
  align-items:center;
}

/* Region labels */
.region-lbl{
  font-family:'Arial Black',sans-serif;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;text-align:center;padding:4px 0 8px;
  grid-column:span 4;
}
.region-lbl.east{color:#60a5fa}
.region-lbl.west{color:#f97316;grid-column:6/10}
.region-lbl.south{color:#a3e635}
.region-lbl.midwest{color:#e879f9;grid-column:6/10}

/* Rounds */
.round-col{
  display:flex;flex-direction:column;
  justify-content:space-around;
  align-self:stretch;
  padding:0 2px;
}
.round-hdr{
  font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#4a6080;
  text-align:center;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.05);
  margin-bottom:4px;white-space:nowrap;
}

/* Game slots */
.game{
  display:flex;flex-direction:column;
  margin:3px 0;
  position:relative;
}
.game::after{
  content:'';position:absolute;
  right:-4px;top:50%;width:4px;height:1px;
  background:rgba(255,255,255,.15);
}
/* connector lines between rounds */
.game-pair{position:relative}
.game-pair::after{
  content:'';position:absolute;
  right:0;top:25%;height:50%;width:2px;
  border-right:1px solid rgba(255,255,255,.12);
}

.team{
  display:flex;align-items:center;gap:3px;
  padding:3px 5px;
  border:1px solid rgba(255,255,255,.1);
  border-bottom:none;
  background:rgba(255,255,255,.03);
  min-height:18px;
  cursor:default;
}
.team:last-child{
  border-bottom:1px solid rgba(255,255,255,.1);
}
.team:first-child{border-radius:3px 3px 0 0}
.team:last-child{border-radius:0 0 3px 3px}
.team-seed{font-size:8px;color:#4a6080;min-width:12px;text-align:right;flex-shrink:0}
.team-name{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.team-line{flex:1;border-bottom:1px dashed rgba(255,255,255,.12);height:9px;margin-left:3px}
.team.tbd{opacity:.35}
.team.tbd .team-name{font-style:italic;color:#4a6080;font-size:8px}

/* Center championship */
.bk-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:8px;
  grid-column:5;grid-row:1/3;
  align-self:stretch;
}
.ff-label{font-family:'Arial Black',sans-serif;font-size:8px;letter-spacing:2px;color:#4a6080;text-transform:uppercase;text-align:center}
.ff-game{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.ff-team{display:flex;align-items:center;gap:4px;padding:4px 6px;font-size:9px;border-bottom:1px solid rgba(255,255,255,.08)}
.ff-team:last-child{border-bottom:none}
.ff-team-lbl{color:#4a6080;font-size:8px;flex:1;white-space:nowrap;overflow:hidden}
.ff-line{flex:1;border-bottom:1px dashed rgba(255,255,255,.15);height:10px}
.champ-box{
  background:linear-gradient(135deg,rgba(245,183,0,.12),rgba(255,92,0,.08));
  border:2px solid rgba(245,183,0,.5);
  border-radius:8px;padding:8px 10px;text-align:center;width:100%;
}
.champ-trophy{font-size:20px;margin-bottom:3px}
.champ-lbl{font-family:'Arial Black',sans-serif;font-size:7px;letter-spacing:2px;color:#f5b700;text-transform:uppercase;margin-bottom:6px}
.champ-line{border-bottom:1px solid rgba(245,183,0,.5);height:14px;margin:0 4px}

/* Connector lines visual — drawn as table structure */
.connector{
  display:flex;flex-direction:column;
  justify-content:space-around;
  align-self:stretch;
  padding:0;
}
.conn-line{
  flex:1;
  border-right:1px solid rgba(255,255,255,.1);
}
.conn-line-mid{
  position:relative;
}
.conn-line-mid::after{
  content:'';position:absolute;
  right:0;top:50%;width:100%;height:1px;
  background:rgba(255,255,255,.1);
}
</style>
</head>
<body>

<div class="screen-btn">
  <h2>🖨️ 2026 NCAA TOURNAMENT BRACKET</h2>
  <div style="display:flex;gap:8px">
    <button class="btn btn-back" onclick="window.location.href='index.html'">← Back</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ PRINT</button>
  </div>
</div>

<div class="bracket-sheet" id="bracket-sheet">
  <div class="bk-header">
    <div class="bk-title">NCAA March Madness</div>
    <div class="bk-year">2026 TOURNAMENT BRACKET</div>
    <div class="bk-name-row">Name: <span class="bk-name-blank"></span></div>
  </div>
  <div id="bracket-grid"></div>
</div>

<script>
const TEAMS = {
  EAST:[
    {seed:1,name:"Duke"},{seed:16,name:"Siena"},
    {seed:8,name:"Ohio State"},{seed:9,name:"TCU"},
    {seed:5,name:"St. John's"},{seed:12,name:"Northern Iowa"},
    {seed:4,name:"Kansas"},{seed:13,name:"Cal Baptist"},
    {seed:6,name:"Louisville"},{seed:11,name:"S. Florida"},
    {seed:3,name:"Michigan St"},{seed:14,name:"N. Dakota St"},
    {seed:7,name:"UCLA"},{seed:10,name:"UCF"},
    {seed:2,name:"UConn"},{seed:15,name:"Furman"}
  ],
  WEST:[
    {seed:1,name:"Arizona"},{seed:16,name:"LIU"},
    {seed:8,name:"Villanova"},{seed:9,name:"Utah State"},
    {seed:5,name:"Wisconsin"},{seed:12,name:"High Point"},
    {seed:4,name:"Arkansas"},{seed:13,name:"Hawaii"},
    {seed:6,name:"BYU"},{seed:11,name:"TX/NC State"},
    {seed:3,name:"Gonzaga"},{seed:14,name:"Kennesaw St"},
    {seed:7,name:"Miami FL"},{seed:10,name:"Missouri"},
    {seed:2,name:"Purdue"},{seed:15,name:"Queens"}
  ],
  SOUTH:[
    {seed:1,name:"Florida"},{seed:16,name:"PV A&M/Lehigh"},
    {seed:8,name:"Clemson"},{seed:9,name:"Iowa"},
    {seed:5,name:"Vanderbilt"},{seed:12,name:"McNeese"},
    {seed:4,name:"Nebraska"},{seed:13,name:"Troy"},
    {seed:6,name:"N. Carolina"},{seed:11,name:"VCU"},
    {seed:3,name:"Illinois"},{seed:14,name:"Penn"},
    {seed:7,name:"Saint Mary's"},{seed:10,name:"Texas A&M"},
    {seed:2,name:"Houston"},{seed:15,name:"Idaho"}
  ],
  MIDWEST:[
    {seed:1,name:"Michigan"},{seed:16,name:"UMBC/Howard"},
    {seed:8,name:"Georgia"},{seed:9,name:"Saint Louis"},
    {seed:5,name:"Texas Tech"},{seed:12,name:"Akron"},
    {seed:4,name:"Alabama"},{seed:13,name:"Hofstra"},
    {seed:6,name:"Tennessee"},{seed:11,name:"SMU/Miami OH"},
    {seed:3,name:"Virginia"},{seed:14,name:"Wright State"},
    {seed:7,name:"Kentucky"},{seed:10,name:"Santa Clara"},
    {seed:2,name:"Iowa State"},{seed:15,name:"Tennessee St"}
  ]
};

function teamEl(t, showLine=false){
  if(!t) return `<div class="team tbd"><span class="team-seed">?</span><span class="team-name">TBD</span></div>`;
  return `<div class="team">
    <span class="team-seed">${t.seed}</span>
    <span class="team-name">${t.name}</span>
    ${showLine ? '<span class="team-line"></span>' : ''}
  </div>`;
}

function gameEl(t1, t2, showLine=false){
  return `<div class="game">${teamEl(t1,showLine)}${teamEl(t2,showLine)}</div>`;
}

function blankGameEl(){
  return `<div class="game">
    <div class="team"><span class="team-seed"></span><span class="team-line" style="flex:1"></span></div>
    <div class="team"><span class="team-seed"></span><span class="team-line" style="flex:1"></span></div>
  </div>`;
}

function buildRegionLeft(teams){
  // R64: 8 games, R32: 4, S16: 2, E8: 1
  const r64=[], r32=[], s16=[], e8=[];
  for(let i=0;i<16;i+=2) r64.push([teams[i],teams[i+1]]);
  for(let i=0;i<4;i++) r32.push([null,null]);
  for(let i=0;i<2;i++) s16.push([null,null]);
  e8.push([null,null]);

  let html=`<div style="display:flex;gap:0;align-items:stretch;height:100%">`;

  // R64
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:148px">`;
  html+=`<div class="round-hdr">ROUND OF 64</div>`;
  r64.forEach(([a,b])=>{ html+=gameEl(a,b); });
  html+=`</div>`;

  // connector
  html+=`<div style="display:flex;flex-direction:column;width:8px;justify-content:space-around">`;
  for(let i=0;i<4;i++){
    html+=`<div style="flex:1;display:flex;flex-direction:column">
      <div style="flex:1;border-right:1px solid rgba(255,255,255,.12)"></div>
      <div style="height:1px;background:rgba(255,255,255,.12)"></div>
      <div style="flex:1;border-right:1px solid rgba(255,255,255,.12)"></div>
    </div>`;
  }
  html+=`</div>`;

  // R32
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:120px">`;
  html+=`<div class="round-hdr">ROUND OF 32</div>`;
  for(let i=0;i<4;i++) html+=blankGameEl();
  html+=`</div>`;

  // connector
  html+=`<div style="display:flex;flex-direction:column;width:8px;justify-content:space-around">`;
  for(let i=0;i<2;i++){
    html+=`<div style="flex:1;display:flex;flex-direction:column">
      <div style="flex:1;border-right:1px solid rgba(255,255,255,.12)"></div>
      <div style="height:1px;background:rgba(255,255,255,.12)"></div>
      <div style="flex:1;border-right:1px solid rgba(255,255,255,.12)"></div>
    </div>`;
  }
  html+=`</div>`;

  // S16
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:92px">`;
  html+=`<div class="round-hdr">SWEET 16</div>`;
  for(let i=0;i<2;i++) html+=blankGameEl();
  html+=`</div>`;

  // connector
  html+=`<div style="display:flex;flex-direction:column;width:8px;justify-content:space-around">`;
  html+=`<div style="flex:1;display:flex;flex-direction:column">
    <div style="flex:1;border-right:1px solid rgba(255,255,255,.12)"></div>
    <div style="height:1px;background:rgba(255,255,255,.12)"></div>
    <div style="flex:1;border-right:1px solid rgba(255,255,255,.12)"></div>
  </div>`;
  html+=`</div>`;

  // E8
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:68px">`;
  html+=`<div class="round-hdr">ELITE 8</div>`;
  html+=blankGameEl();
  html+=`</div>`;

  // arrow to FF
  html+=`<div style="display:flex;align-items:center;width:16px"><div style="width:100%;height:1px;background:rgba(255,255,255,.15)"></div></div>`;

  html+=`</div>`;
  return html;
}

function buildRegionRight(teams){
  let html=`<div style="display:flex;gap:0;align-items:stretch;height:100%">`;

  // arrow from FF
  html+=`<div style="display:flex;align-items:center;width:16px"><div style="width:100%;height:1px;background:rgba(255,255,255,.15)"></div></div>`;

  // E8
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:68px">`;
  html+=`<div class="round-hdr">ELITE 8</div>`;
  html+=blankGameEl();
  html+=`</div>`;

  // connector
  html+=`<div style="display:flex;flex-direction:column;width:8px;justify-content:space-around">`;
  html+=`<div style="flex:1;display:flex;flex-direction:column">
    <div style="flex:1;border-left:1px solid rgba(255,255,255,.12)"></div>
    <div style="height:1px;background:rgba(255,255,255,.12)"></div>
    <div style="flex:1;border-left:1px solid rgba(255,255,255,.12)"></div>
  </div>`;
  html+=`</div>`;

  // S16
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:92px">`;
  html+=`<div class="round-hdr">SWEET 16</div>`;
  for(let i=0;i<2;i++) html+=blankGameEl();
  html+=`</div>`;

  // connector
  html+=`<div style="display:flex;flex-direction:column;width:8px;justify-content:space-around">`;
  for(let i=0;i<2;i++){
    html+=`<div style="flex:1;display:flex;flex-direction:column">
      <div style="flex:1;border-left:1px solid rgba(255,255,255,.12)"></div>
      <div style="height:1px;background:rgba(255,255,255,.12)"></div>
      <div style="flex:1;border-left:1px solid rgba(255,255,255,.12)"></div>
    </div>`;
  }
  html+=`</div>`;

  // R32
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:120px">`;
  html+=`<div class="round-hdr">ROUND OF 32</div>`;
  for(let i=0;i<4;i++) html+=blankGameEl();
  html+=`</div>`;

  // connector
  html+=`<div style="display:flex;flex-direction:column;width:8px;justify-content:space-around">`;
  for(let i=0;i<4;i++){
    html+=`<div style="flex:1;display:flex;flex-direction:column">
      <div style="flex:1;border-left:1px solid rgba(255,255,255,.12)"></div>
      <div style="height:1px;background:rgba(255,255,255,.12)"></div>
      <div style="flex:1;border-left:1px solid rgba(255,255,255,.12)"></div>
    </div>`;
  }
  html+=`</div>`;

  // R64
  html+=`<div style="display:flex;flex-direction:column;justify-content:space-around;min-width:148px">`;
  html+=`<div class="round-hdr">ROUND OF 64</div>`;
  for(let i=0;i<16;i+=2) html+=gameEl(teams[i],teams[i+1]);
  html+=`</div>`;

  html+=`</div>`;
  return html;
}

function buildCenter(){
  return `
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:130px;gap:10px;padding:0 8px">
    <div style="font-size:8px;letter-spacing:2px;color:#4a6080;text-align:center;text-transform:uppercase;font-weight:bold">FINAL FOUR</div>
    <div style="width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:4px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:4px;padding:5px 7px;border-bottom:1px solid rgba(255,255,255,.08)">
        <span style="font-size:8px;color:#60a5fa;font-weight:bold">E</span>
        <span style="flex:1;border-bottom:1px dashed rgba(255,255,255,.15);height:10px"></span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;padding:5px 7px">
        <span style="font-size:8px;color:#f97316;font-weight:bold">W</span>
        <span style="flex:1;border-bottom:1px dashed rgba(255,255,255,.15);height:10px"></span>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,rgba(245,183,0,.15),rgba(255,92,0,.1));border:2px solid rgba(245,183,0,.5);border-radius:8px;padding:10px 8px;text-align:center;width:100%">
      <div style="font-size:20px;margin-bottom:3px">🏆</div>
      <div style="font-size:7px;letter-spacing:2px;color:#f5b700;font-weight:bold;text-transform:uppercase;margin-bottom:8px">2026 CHAMPION</div>
      <div style="border-bottom:1px solid rgba(245,183,0,.5);height:14px;margin:0 4px"></div>
    </div>
    <div style="width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:4px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:4px;padding:5px 7px;border-bottom:1px solid rgba(255,255,255,.08)">
        <span style="font-size:8px;color:#a3e635;font-weight:bold">S</span>
        <span style="flex:1;border-bottom:1px dashed rgba(255,255,255,.15);height:10px"></span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;padding:5px 7px">
        <span style="font-size:8px;color:#e879f9;font-weight:bold">M</span>
        <span style="flex:1;border-bottom:1px dashed rgba(255,255,255,.15);height:10px"></span>
      </div>
    </div>
    <div style="font-size:8px;letter-spacing:2px;color:#4a6080;text-align:center;text-transform:uppercase;font-weight:bold">CHAMPIONSHIP</div>
    <div style="width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:4px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:4px;padding:5px 7px;border-bottom:1px solid rgba(255,255,255,.08)">
        <span style="font-size:8px;color:#4a6080">E/W</span>
        <span style="flex:1;border-bottom:1px dashed rgba(255,255,255,.15);height:10px"></span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;padding:5px 7px">
        <span style="font-size:8px;color:#4a6080">S/M</span>
        <span style="flex:1;border-bottom:1px dashed rgba(255,255,255,.15);height:10px"></span>
      </div>
    </div>
  </div>`;
}

function build(){
  const grid = document.getElementById('bracket-grid');
  // Region labels row
  const rColors = {EAST:'#60a5fa',WEST:'#f97316',SOUTH:'#a3e635',MIDWEST:'#e879f9'};

  grid.innerHTML = `
  <!-- TOP ROW: EAST + CENTER + WEST -->
  <div style="display:flex;gap:0;margin-bottom:12px;align-items:stretch">
    <div style="display:flex;flex-direction:column;flex:1">
      <div style="font-family:'Arial Black',sans-serif;font-size:10px;letter-spacing:2px;color:${rColors.EAST};padding:0 0 6px 4px">EAST REGION</div>
      ${buildRegionLeft(TEAMS.EAST)}
    </div>
    ${buildCenter()}
    <div style="display:flex;flex-direction:column;flex:1">
      <div style="font-family:'Arial Black',sans-serif;font-size:10px;letter-spacing:2px;color:${rColors.WEST};padding:0 4px 6px 0;text-align:right">WEST REGION</div>
      ${buildRegionRight(TEAMS.WEST)}
    </div>
  </div>
  <div style="height:1px;background:rgba(255,255,255,.06);margin:0 0 12px"></div>
  <!-- BOTTOM ROW: SOUTH + MIDWEST -->
  <div style="display:flex;gap:0;align-items:stretch">
    <div style="display:flex;flex-direction:column;flex:1">
      <div style="font-family:'Arial Black',sans-serif;font-size:10px;letter-spacing:2px;color:${rColors.SOUTH};padding:0 0 6px 4px">SOUTH REGION</div>
      ${buildRegionLeft(TEAMS.SOUTH)}
    </div>
    <div style="min-width:130px;padding:0 8px;display:flex;align-items:center;justify-content:center">
      <div style="font-size:8px;color:#4a6080;letter-spacing:1px;text-align:center;text-transform:uppercase">← Final Four<br>feeds up</div>
    </div>
    <div style="display:flex;flex-direction:column;flex:1">
      <div style="font-family:'Arial Black',sans-serif;font-size:10px;letter-spacing:2px;color:${rColors.MIDWEST};padding:0 4px 6px 0;text-align:right">MIDWEST REGION</div>
      ${buildRegionRight(TEAMS.MIDWEST)}
    </div>
  </div>`;
}

build();
window.addEventListener('load', function(){
  setTimeout(function(){ window.print(); }, 600);
});
</script>

<style>
@media print{
  @page{size:landscape;margin:5mm}
  body{background:#fff!important;color:#000!important}
  .screen-btn{display:none!important}
  .bracket-sheet{width:100%!important;padding:4px!important}
  .bk-title{color:#c0392b!important}
  .round-hdr{color:#999!important;border-bottom-color:#ddd!important}
  .team{border-color:#ccc!important;background:#fafafa!important}
  .team-seed{color:#999!important}
  .team-name{color:#000!important}
  .team-line{border-bottom-color:#ccc!important}
  .tbd .team-name{color:#ccc!important}
